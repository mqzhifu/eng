<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 翻版记忆短语 - 英语语法学习乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .time {
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
        }

        .game-content {
            padding: 40px;
            text-align: center;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 30px 0;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: white;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .card.flipped::before {
            transform: rotateY(180deg);
            opacity: 0;
        }

        .card-content {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            opacity: 0;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .card.flipped .card-content {
            opacity: 1;
        }

        .card.matched {
            background: #d4edda;
            border: 2px solid #28a745;
            cursor: default;
            transform: scale(0.95);
        }

        .card.matched::before {
            transform: rotateY(180deg);
            opacity: 0;
        }

        .card.matched .card-content {
            color: #155724;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .instructions p {
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 30px;
        }

        .start-btn,
        .restart-btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .give-up-btn {
            background: linear-gradient(90deg, #f44336, #d32f2f);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .start-btn:hover,
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .give-up-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        .result {
            text-align: center;
            padding: 50px;
            display: none;
        }

        .result h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .result-score {
            font-size: 72px;
            font-weight: bold;
            color: #764ba2;
            margin: 30px 0;
        }

        .result-message {
            font-size: 24px;
            margin-bottom: 40px;
            color: #333;
        }

        .home-btn {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .home-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f00;
            border-radius: 50%;
            animation: confetti 3s ease-in-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
            }
            
            .game-content {
                padding: 20px;
            }
            
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            
            .card {
                height: 100px;
                padding: 15px;
            }
            
            .card-content {
                font-size: 14px;
            }
            
            .result-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="game_index.html" class="back-btn">⬅ 返回</a>
            <h1>🧠 翻版记忆短语</h1>
            <p>翻开卡片，找到英文和中文对应的短语，锻炼你的记忆力！</p>
        </div>

        <div class="game-info">
            <div class="score">
                分数: <span id="score">0</span>
            </div>
            <div class="time">
                用时: <span id="game-time">00:00</span>
            </div>
        </div>

        <div class="game-content">
            <div class="game-board" id="game-board">
                <!-- 卡片将通过JavaScript动态生成 -->
            </div>

            <div class="error-message" id="error-message"></div>

            <div class="controls">
                <button class="start-btn" id="start-btn">开始游戏</button>
                <button class="restart-btn" id="restart-btn">重新开始</button>
                <button class="give-up-btn" id="give-up-btn" style="display: none;">放弃</button>
            </div>

            <div class="result" id="result">
                <h2>🎉 游戏结束！</h2>
                <div class="result-score" id="result-score">0</div>
                <div class="result-message" id="result-message"></div>
                <button class="restart-btn" id="result-restart-btn">再玩一次</button>
                <a href="game_index.html" class="home-btn">返回游戏列表</a>
            </div>
        </div>
    </div>

    <script>
        // 短语数据源
        const phrases = [
            // GET组成短语
            { english: "get up", chinese: "起床", example: "I get up early." },
            { english: "get on", chinese: "上车", example: "Get on the bus." },
            { english: "get off", chinese: "下车", example: "Get off the train." },
            { english: "get in", chinese: "进入 / 上车（小车）", example: "Get in the car." },
            { english: "get to", chinese: "到达", example: "I get to school at 7." },
            { english: "get ready for", chinese: "为…… 做好准备", example: "Get ready for class." },
            { english: "get back", chinese: "回来", example: "I will get back soon." },
            { english: "get dressed", chinese: "穿好衣服", example: "Get dressed quickly." },
            
            // come组成短语
            { english: "come on", chinese: "快点 / 加油" },
            { english: "come in", chinese: "进来" },
            { english: "come out", chinese: "出来 / 出版" },
            { english: "come back", chinese: "回来" },
            { english: "come from", chinese: "来自" },
            { english: "come true", chinese: "实现" },
            { english: "come over", chinese: "顺便来访" },
            { english: "come up", chinese: "走近 / 出现" },
            
            // take组成短语
            { english: "take off", chinese: "脱下 / 起飞" },
            { english: "take out", chinese: "取出 / 带出" },
            { english: "take away", chinese: "拿走 / 外卖" },
            { english: "take back", chinese: "收回 / 退回" },
            { english: "take care", chinese: "小心 / 保重" },
            { english: "take a walk", chinese: "散步" },
            { english: "take a rest", chinese: "休息" },
            { english: "take a look", chinese: "看一看" },
            
            // put 组成的短语
            { english: "put on", chinese: "穿上 / 上演" },
            { english: "put off", chinese: "推迟" },
            { english: "put up", chinese: "张贴 / 举起" },
            { english: "put down", chinese: "放下 / 记下" },
            { english: "put away", chinese: "收起来 / 整理" },
            { english: "put out", chinese: "扑灭 / 伸出" },
            { english: "put back", chinese: "放回" },
            { english: "put into", chinese: "把…… 放进" },
            
            // turn 组成的短语
            { english: "turn on", chinese: "打开（电器）" },
            { english: "turn off", chinese: "关掉（电器）" },
            { english: "turn up", chinese: "调大（音量）" },
            { english: "turn down", chinese: "调小（音量）/ 拒绝" },
            { english: "turn left", chinese: "向左转" },
            { english: "turn right", chinese: "向右转" },
            { english: "turn around", chinese: "转身" },
            { english: "turn into", chinese: "变成" }
        ];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let score = 0;
        let gameStarted = false;
        let gameStartTime = 0;
        let gameEndTime = 0;
        let timerInterval = null;

        // 初始化游戏
        function initGame() {
            // 随机选择10个短语（20张卡片）
            const shuffledPhrases = [...phrases].sort(() => Math.random() - 0.5);
            const selectedPhrases = shuffledPhrases.slice(0, 10);
            
            // 创建卡片数组
            cards = [];
            selectedPhrases.forEach(phrase => {
                // 添加英文卡片
                cards.push({
                    id: Math.random().toString(36).substr(2, 9),
                    text: phrase.english,
                    type: 'english',
                    matchId: phrase.english
                });
                // 添加中文卡片
                cards.push({
                    id: Math.random().toString(36).substr(2, 9),
                    text: phrase.chinese,
                    type: 'chinese',
                    matchId: phrase.english
                });
            });
            
            // 打乱卡片顺序
            cards.sort(() => Math.random() - 0.5);
            
            // 重置游戏状态
            flippedCards = [];
            matchedPairs = 0;
            score = 0;
            gameStarted = false;
            
            // 更新UI
            document.getElementById('score').textContent = score;
            document.getElementById('game-time').textContent = '00:00';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('restart-btn').style.display = 'none';
            document.getElementById('give-up-btn').style.display = 'none';
            
            // 清除计时器
            clearInterval(timerInterval);
            
            // 生成游戏板
            generateGameBoard();
        }

        // 生成游戏板
        function generateGameBoard() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            
            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.id = card.id;
                cardElement.dataset.matchId = card.matchId;
                cardElement.dataset.type = card.type;
                
                const cardContent = document.createElement('div');
                cardContent.className = 'card-content';
                cardContent.textContent = card.text;
                
                cardElement.appendChild(cardContent);
                cardElement.addEventListener('click', () => flipCard(cardElement));
                gameBoard.appendChild(cardElement);
            });
        }

        // 播放语音
        function playAudio(text) {
            // 使用Web Speech API
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.7;
                speechSynthesis.speak(utterance);
            }
        }

        // 翻转卡片
        function flipCard(card) {
            if (!gameStarted) {
                // 显示提示弹窗
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>提示</h3>
                        <p>请先点击「开始游戏」按钮</p>
                        <button class="start-btn" id="modal-start-btn">开始游戏</button>
                    </div>
                `;
                
                // 添加弹窗样式
                const style = document.createElement('style');
                style.textContent = `
                    .modal {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(0, 0, 0, 0.5);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        z-index: 2000;
                        animation: fadeIn 0.3s ease;
                    }
                    .modal-content {
                        background: white;
                        border-radius: 20px;
                        padding: 40px;
                        text-align: center;
                        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                        max-width: 400px;
                        width: 90%;
                        animation: slideIn 0.3s ease;
                    }
                    .modal-content h3 {
                        color: #667eea;
                        margin-bottom: 20px;
                    }
                    .modal-content p {
                        font-size: 18px;
                        margin-bottom: 30px;
                        color: #333;
                    }
                    @keyframes fadeIn {
                        from { opacity: 0; }
                        to { opacity: 1; }
                    }
                    @keyframes slideIn {
                        from { opacity: 0; transform: translateY(-20px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                `;
                document.head.appendChild(style);
                document.body.appendChild(modal);
                
                // 添加事件监听
                document.getElementById('modal-start-btn').addEventListener('click', () => {
                    modal.remove();
                    style.remove();
                    startGame();
                });
                return;
            }
            
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            // 播放卡片内容的语音
            const cardText = card.querySelector('.card-content').textContent;
            playAudio(cardText);
            
            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 1000);
            }
        }

        // 检查匹配
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const matchId1 = card1.dataset.matchId;
            const matchId2 = card2.dataset.matchId;
            const type1 = card1.dataset.type;
            const type2 = card2.dataset.type;
            
            // 检查是否是不同类型的卡片（一张英文，一张中文）并且匹配ID相同
            if (matchId1 === matchId2 && type1 !== type2) {
                // 匹配成功
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                score += 10;
                document.getElementById('score').textContent = score;
                createConfetti();
                
                // 隐藏错误消息
                document.getElementById('error-message').style.display = 'none';
                
                // 检查游戏是否结束
                if (matchedPairs === cards.length / 2) {
                    endGame();
                }
            } else {
                // 匹配失败
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                
                // 显示错误消息
                const errorMessage = document.getElementById('error-message');
                errorMessage.textContent = '❌ 匹配错误！再试一次';
                errorMessage.style.display = 'block';
                
                // 2秒后隐藏错误消息
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 2000);
            }
            
            flippedCards = [];
        }

        // 创建庆祝效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                // 3秒后移除
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 开始游戏
        function startGame() {
            gameStarted = true;
            gameStartTime = Date.now();
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'inline-block';
            document.getElementById('give-up-btn').style.display = 'inline-block';
            
            // 启动计时器
            startTimer();
        }
        
        // 启动计时器
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsedTime = Math.round((Date.now() - gameStartTime) / 1000);
                const minutes = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
                const seconds = (elapsedTime % 60).toString().padStart(2, '0');
                document.getElementById('game-time').textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        // 结束游戏
        function endGame() {
            gameStarted = false;
            clearInterval(timerInterval);
            gameEndTime = Date.now();
            const gameTime = Math.round((gameEndTime - gameStartTime) / 1000);
            
            // 计算用时
            const minutes = Math.floor(gameTime / 60);
            const seconds = gameTime % 60;
            const timeString = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
            
            // 创建弹窗
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🎉 游戏结束！</h2>
                    <div class="modal-score">${score}</div>
                    <div class="modal-time">用时：${timeString}</div>
                    <div class="modal-message"></div>
                    <div class="modal-buttons">
                        <button class="restart-btn" id="modal-restart-btn">再玩一次</button>
                        <button class="home-btn" id="modal-home-btn">返回游戏列表</button>
                    </div>
                </div>
            `;
            
            // 添加弹窗样式
            const style = document.createElement('style');
            style.textContent = `
                .modal {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.5);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 2000;
                    animation: fadeIn 0.3s ease;
                }
                .modal-content {
                    background: white;
                    border-radius: 20px;
                    padding: 40px;
                    text-align: center;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                    max-width: 500px;
                    width: 90%;
                    animation: slideIn 0.3s ease;
                }
                .modal-score {
                    font-size: 72px;
                    font-weight: bold;
                    color: #764ba2;
                    margin: 30px 0;
                }
                .modal-time {
                    font-size: 20px;
                    color: #667eea;
                    margin-bottom: 20px;
                }
                .modal-message {
                    font-size: 24px;
                    margin-bottom: 40px;
                    color: #333;
                }
                .modal-buttons {
                    display: flex;
                    justify-content: center;
                    gap: 20px;
                }
                @keyframes fadeIn {
                    from { opacity: 0; }
                    to { opacity: 1; }
                }
                @keyframes slideIn {
                    from { opacity: 0; transform: translateY(-20px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
            document.body.appendChild(modal);
            
            // 设置消息
            const message = modal.querySelector('.modal-message');
            if (score === cards.length / 2 * 10) {
                message.textContent = '太棒了！你是记忆大师！';
                createConfetti();
            } else if (score >= cards.length / 2 * 10 * 0.7) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= cards.length / 2 * 10 * 0.5) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
            
            // 添加事件监听
            document.getElementById('modal-restart-btn').addEventListener('click', () => {
                modal.remove();
                style.remove();
                initGame();
            });
            
            document.getElementById('modal-home-btn').addEventListener('click', () => {
                window.location.href = 'game_index.html';
            });
        }

        // 放弃游戏
        function giveUpGame() {
            // 打开所有卡片
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                card.classList.add('flipped');
            });
        }

        // 事件监听
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('give-up-btn').addEventListener('click', giveUpGame);
        document.getElementById('result-restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
