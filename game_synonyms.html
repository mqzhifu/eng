                    const option = this.closest('.option');

        // 播放音频
        function playAudio() {
            const question = questions[currentQuestion];
            // 按顺序播放所有正确答案的音频
            let delay = 0;
            question.correctAnswers.forEach(word => {
                const audioPath = audioMapping[word];
                if (audioPath) {
                    // 使用setTimeout按顺序播放，避免同时播放多个声音
                    setTimeout(() => {
                        const audio = new Audio(audioPath);
                        audio.onerror = function() {
                            console.log('音频播放失败:', audioPath);
                        };
                        audio.play();
                    }, delay);
                    // 每个音频之间间隔500毫秒
                    delay += 500;
                } else {
                    console.log('没有对应的音频文件:', word);
                }
            });
        }

        // 选择选项
        function checkAnswers() {
            const question = questions[currentQuestion];
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const selectedOptions = [];
            
            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    selectedOptions.push(checkbox.value);
                }
            });
            
            // 检查是否至少选择了一个选项
            if (selectedOptions.length === 0) {
                // 创建自定义弹窗
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>提示</h3>
                        <p>请至少选择一个选项！</p>
                        <button class="next-btn" id="modal-ok-btn">确定</button>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 添加事件监听
                document.getElementById('modal-ok-btn').addEventListener('click', () => {
                    modal.remove();
                });
                return;
            }
            
            // 检查答案是否正确
            const isCorrect = selectedOptions.length === question.correctAnswers.length && 
                           selectedOptions.every(option => question.correctAnswers.includes(option));
            
            // 显示正确和错误的选项
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                const checkbox = option.querySelector('input[type="checkbox"]');
                const optionText = option.querySelector('span');
                const word = checkbox.value;
                const translation = wordTranslations[word] || '';
                
                // 添加中文翻译
                if (optionText && !optionText.querySelector('.translation')) {
                    optionText.innerHTML = `${word} <span class="translation">(${translation})</span>`;
                }
                
                if (question.correctAnswers.includes(checkbox.value)) {
                    option.classList.add('correct');
                } else if (checkbox.checked) {
                    option.classList.add('incorrect');
                }
            });
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            if (isCorrect) {
                score += 5; // 每题5分
                correctAnswers++; // 增加正确答案计数
                document.getElementById('score').textContent = score;
                feedback.textContent = '🎉 回答正确！';
                feedback.className = 'feedback correct';
                createConfetti();
            } else {
                errorCount++; // 增加错误计数
                document.getElementById('error-count').textContent = errorCount;
                feedback.textContent = `❌ 回答错误！正确答案是: ${question.correctAnswers.join(', ')}`;
                feedback.className = 'feedback incorrect';
            }
            
            feedback.style.display = 'block';
            answered = true;
            
            // 自动播放正确答案的音频
            playAudio();
            
            // 显示音频播放按钮
            document.getElementById('play-audio-btn').style.display = 'flex';
        }

        // 创建庆祝效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                // 3秒后移除
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 下一题
        function nextQuestion() {
            if (!answered) {
                checkAnswers();
                return;
            }
            
            currentQuestion++;
            if (currentQuestion < questions.length) {
                document.getElementById('current-question').textContent = currentQuestion + 1;
                document.getElementById('progress-fill').style.width = ((currentQuestion / questions.length) * 100) + '%';
                loadQuestion();
            } else {
                document.getElementById('progress-fill').style.width = '100%';
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-score').textContent = score;
            
            // 计算正确率、错误率和总耗时
            const totalQuestions = questions.length;
            const accuracy = ((correctAnswers / totalQuestions) * 100).toFixed(0);
            const errorRate = (( (totalQuestions - correctAnswers) / totalQuestions) * 100).toFixed(0);
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(duration / 60);
            const seconds = duration % 60;
            const formattedDuration = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 显示统计信息
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            document.getElementById('error-rate').textContent = `${errorRate}%`;
            document.getElementById('duration').textContent = formattedDuration;
            
            const message = document.getElementById('result-message');
            if (score === 100) {
                message.textContent = '太棒了！你是近似词大师！';
                createConfetti();
            } else if (score >= 80) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= 60) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
        }

        // 生成雪花
        function createSnowflakes() {
            const snowflakesContainer = document.getElementById('snowflakes');
            if (!snowflakesContainer) return;
            
            setInterval(() => {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.top = '-10px';
                snowflake.style.width = Math.random() * 4 + 2 + 'px';
                snowflake.style.height = snowflake.style.width;
                snowflake.style.animationDelay = Math.random() * 3 + 's';
                snowflake.style.animationDuration = Math.random() * 2 + 2 + 's';
                
                snowflakesContainer.appendChild(snowflake);
                
                // 3秒后移除雪花
                setTimeout(() => {
                    snowflake.remove();
                }, 5000);
            }, 500);
        }

        // 事件监听
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('game-restart-btn').addEventListener('click', initGame);
        document.getElementById('play-audio-btn').addEventListener('click', playAudio);

        // 初始化游戏
        initGame();
        
        // 生成雪花
        createSnowflakes();
