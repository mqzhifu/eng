<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 英语语法学习乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            animation: fadeInDown 1s;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 20px;
            margin-bottom: 50px;
            animation: fadeInUp 1s;
        }

        .options {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .option-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            width: 300px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeInUp 1s;
            text-decoration: none;
            color: inherit;
        }

        .option-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .option-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .option-title {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .option-desc {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            .option-card { width: 260px; padding: 40px 30px; }
            .option-icon { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 英语语法学习乐园</h1>
        <p class="subtitle">让学习英语变得简单有趣！</p>
        
        <div class="options">
            <a href="dict.html" class="option-card">
                <div class="option-icon">📚</div>
                <div class="option-title">字典汇总</div>
                <div class="option-desc">查看完整的英语语法词典，包含所有知识点和详细解释</div>
            </a>
            
            <a href="game_index.html" class="option-card">
                <div class="option-icon">🎮</div>
                <div class="option-title">游戏闯关</div>
                <div class="option-desc">通过有趣的小游戏巩固学习，边玩边学更轻松</div>
            </a>
        </div>
    </div>
</body>
</html>
