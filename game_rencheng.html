        // 随机选择20道题
        function getRandomQuestions() {
            const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 20);
        }
        
        let questions = getRandomQuestions();

        let currentQuestion = 0;
        let score = 0;
        let errorCount = 0;
        let answered = false;
        let startTime = 0;
        let correctAnswers = 0;

        // 初始化游戏
        function initGame() {
            // 重新随机选择20道题
            questions = getRandomQuestions();
            currentQuestion = 0;
            score = 0;
            errorCount = 0;
            answered = false;
            correctAnswers = 0;
            startTime = Date.now(); // 记录开始时间
            document.getElementById('current-question').textContent = 1;
            document.getElementById('score').textContent = 0;
            document.getElementById('error-count').textContent = 0;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('result').style.display = 'none';
            document.getElementById('question').style.display = 'block';
            loadQuestion();
        }

        // 加载题目
        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('sentence').innerHTML = question.sentence;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            // 随机打乱选项
            const shuffledOptions = [...question.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(option => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.dataset.answer = option;
                // 添加点击事件支持
                optionElement.addEventListener('click', selectOption);
                // 添加触摸事件支持
                optionElement.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // 防止触发点击事件
                    selectOption(e);
                });
                optionsContainer.appendChild(optionElement);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('translation').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            answered = false;
        }

        // 选择选项
        function selectOption(e) {
            if (answered) return;
            
            const selectedOption = e.target;
            const question = questions[currentQuestion];
            const correctAnswer = question.correctAnswer;
            const explanation = question.explanation || '';
            
            // 禁用所有选项
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.removeEventListener('click', selectOption);
                if (option.dataset.answer === correctAnswer) {
                    option.classList.add('correct');
                    if (option === selectedOption) {
                        animateOption(option, true);
                    }
                } else if (option === selectedOption && option.dataset.answer !== correctAnswer) {
                    option.classList.add('incorrect');
                    animateOption(option, false);
                }
            });
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            const icePrincess = document.getElementById('ice-princess');
            const princessFace = document.getElementById('princess-face');
            if (selectedOption.dataset.answer === correctAnswer) {
                score += 5; // 每题5分
                correctAnswers++; // 增加正确答案计数
                document.getElementById('score').textContent = score;
                feedback.textContent = '🎉 回答正确！';
                feedback.className = 'feedback correct';
                // 添加得分动画
                animateScore();
                // 冰雪公主开心表情
                princessFace.textContent = '😄';
                icePrincess.className = 'ice-princess happy';
                setTimeout(() => {
                    icePrincess.className = 'ice-princess';
                }, 1000);
            } else {
                errorCount++; // 增加错误次数
                document.getElementById('error-count').textContent = errorCount;
                feedback.textContent = `❌ 回答错误！正确答案是: ${correctAnswer}。${explanation}`;
                feedback.className = 'feedback incorrect';
                // 冰雪公主伤心表情
                princessFace.textContent = '😢';
                icePrincess.className = 'ice-princess sad';
                setTimeout(() => {
                    icePrincess.className = 'ice-princess';
                }, 1000);
            }
            
            feedback.style.display = 'block';
            
            // 将正确答案写进空格处
            const correctSentenceWithHTML = question.sentence.replace('______', `<span class="blank filled">${question.correctAnswer}</span>`);
            const correctSentencePlain = question.sentence.replace('______', question.correctAnswer);
            document.getElementById('sentence').innerHTML = correctSentenceWithHTML;
            
            // 显示翻译和语音播放
            if (questions && questions[currentQuestion]) {
                const translation = getTranslation(correctSentencePlain);
                
                document.getElementById('translation-content').innerHTML = `
                    <strong>中文翻译：</strong>${translation}
                `;
                document.getElementById('translation').style.display = 'block';
                
                // 播放语音 - 只播放问题句子，不播放答案
                playAudio(question.sentence);
            }
            
            // 添加翻转动画
            icePrincess.classList.add('flip');
            
            // 动画结束后移除翻转类
            setTimeout(() => {
                icePrincess.classList.remove('flip');
            }, 1000);
            
            document.getElementById('next-btn').style.display = 'inline-block';
            answered = true;
        }

        // 得分动画
        function animateScore() {
            const scoreElement = document.getElementById('score');
            scoreElement.classList.add('score-animation');
            setTimeout(() => {
                scoreElement.classList.remove('score-animation');
            }, 1000);
        }

        // 选项选择动画
        function animateOption(option, isCorrect) {
            option.classList.add('option-animation');
            if (isCorrect) {
                option.classList.add('correct-animation');
            } else {
                option.classList.add('incorrect-animation');
            }
            setTimeout(() => {
                option.classList.remove('option-animation', 'correct-animation', 'incorrect-animation');
            }, 1000);
        }

        // 显示结果
        function showResult() {
            // 设置进度条为100%
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('question').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-score').textContent = score;
            
            // 计算统计信息
            const totalQuestions = questions.length;
            const accuracy = Math.round((correctAnswers / totalQuestions) * 100);
            const errorRate = 100 - accuracy;
            const endTime = Date.now();
            const durationMs = endTime - startTime;
            const minutes = Math.floor(durationMs / 60000);
            const seconds = Math.floor((durationMs % 60000) / 1000);
            const durationStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 显示统计信息
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            document.getElementById('error-rate').textContent = `${errorRate}%`;
            document.getElementById('duration').textContent = durationStr;
            
            const message = document.getElementById('result-message');
            if (score === 100) {
                message.textContent = '太棒了！你是人称代词大师！';
            } else if (score >= 80) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= 60) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
        }

                // 随机位置
                snowflake.style.left = `${Math.random() * 100}%`;
                snowflake.style.animationDelay = `${Math.random() * 10}s`;
                snowflake.style.animationDuration = `${Math.random() * 10 + 5}s`;
                
                // 随机透明度
                snowflake.style.opacity = Math.random() * 0.8 + 0.2;
                
                snowflakesContainer.appendChild(snowflake);
            }
        }

        // 初始化
        initGame();
        generateSnowflakes();
    </script>
</body>
</html>
