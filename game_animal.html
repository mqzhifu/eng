        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let errorCount = 0;
        let answered = false;

        // 初始化游戏
        function initGame() {
            // 随机选择20道题
            const shuffled = [...animalQuestions].sort(() => Math.random() - 0.5);
            questions = shuffled.slice(0, 20);
            
            currentQuestion = 0;
            score = 0;
            errorCount = 0;
            answered = false;
            document.getElementById('current-question').textContent = 1;
            document.getElementById('score').textContent = 0;
            document.getElementById('error-count').textContent = 0;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('result').style.display = 'none';
            document.getElementById('question').style.display = 'block';
            loadQuestion();
        }

        // 加载题目
        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-text').textContent = question.description;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            // 随机打乱选项
            const shuffledOptions = [...question.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(option => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.dataset.answer = option;
                optionElement.addEventListener('click', selectOption);
                optionsContainer.appendChild(optionElement);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('translation').style.display = 'none';
            answered = false;
        }

        // 选择选项
        function selectOption(e) {
            if (answered) return;
            
            const selectedOption = e.target;
            const question = questions[currentQuestion];
            const correctAnswer = question.answer;
            
            // 禁用所有选项
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.removeEventListener('click', selectOption);
                if (option.dataset.answer === correctAnswer) {
                    option.classList.add('correct');
                    if (option === selectedOption) {
                        animateOption(option, true);
                    }
                } else if (option === selectedOption && option.dataset.answer !== correctAnswer) {
                    option.classList.add('incorrect');
                    animateOption(option, false);
                }
            });
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            if (selectedOption.dataset.answer === correctAnswer) {
                score += 5; // 每题5分
                document.getElementById('score').textContent = score;
                feedback.textContent = '🎉 回答正确！';
                feedback.className = 'feedback correct';
                createConfetti();
            } else {
                errorCount++; // 增加错误次数
                document.getElementById('error-count').textContent = errorCount;
                feedback.textContent = `❌ 回答错误！正确答案是: ${correctAnswer}`;
                feedback.className = 'feedback incorrect';
            }
            
            // 显示翻译
            document.getElementById('translation-content').innerHTML = `
                <strong>问题翻译：</strong>${question.descriptionChinese}<br>
                <strong>中文名称：</strong>${question.chinese}
            `;
            document.getElementById('translation').style.display = 'block';
            
            feedback.style.display = 'block';
            document.getElementById('next-btn').style.display = 'inline-block';
            answered = true;
        }

        // 选项选择动画
        function animateOption(option, isCorrect) {
            option.classList.add('option-animation');
            if (isCorrect) {
                option.classList.add('correct-animation');
            } else {
                option.classList.add('incorrect-animation');
            }
            setTimeout(() => {
                option.classList.remove('option-animation', 'correct-animation', 'incorrect-animation');
            }, 1000);
        }

        // 创建庆祝效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                // 3秒后移除
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 下一题
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                document.getElementById('current-question').textContent = currentQuestion + 1;
                // 如果是最后一题，设置进度条为100%
                if (currentQuestion === questions.length - 1) {
                    document.getElementById('progress-fill').style.width = '100%';
                } else {
                    document.getElementById('progress-fill').style.width = ((currentQuestion / questions.length) * 100) + '%';
                }
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            // 设置进度条为100%
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('question').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-score').textContent = score;
            
            const message = document.getElementById('result-message');
            if (score === 100) {
                message.textContent = '太棒了！你是动物专家！';
                createConfetti();
            } else if (score >= 80) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= 60) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
        }

        // 事件监听
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('game-restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        initGame();
