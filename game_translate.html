<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(102, 126, 234, 0.2);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .info-item {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .info-item span {
            color: #667eea;
            margin-left: 5px;
        }

        .question-container {
            margin-bottom: 40px;
        }

        .question-number {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .option {
            padding: 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 500;
        }

        .option:hover {
            background: #e3f2fd;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .option.correct {
            background: #e8f5e9;
            border-color: #4CAF50;
            color: #388E3C;
        }

        .option.incorrect {
            background: #ffebee;
            border-color: #f44336;
            color: #c62828;
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #388E3C;
            display: block;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .controls {
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .modal h2 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .modal p {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .modal .result {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin-top: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .question-text {
                font-size: 20px;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .game-info {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }
        }
    </style>
</head>

        <div class="game-info">

            <div class="options-container" id="optionsContainer">

            <div class="feedback" id="feedback"></div>

        <div class="controls">

            { english: "Which TV show do you like best?", chinese: "你最喜欢哪个电视节目？", type: "which" },

            { english: "How do you get to school?", chinese: "你怎么去学校？", type: "how" },

            { english: "How do you get to work?", chinese: "你怎么去上班？", type: "how" },
            { english: "How do you get to the store?", chinese: "你怎么去商店？", type: "how" },
            { english: "How do you get to the park?", chinese: "你怎么去公园？", type: "how" }
        ];

        // 游戏变量
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let startTime = 0;
        let endTime = 0;
        let gameStarted = false;
        let answerSelected = false;

        // DOM 元素
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const questionCount = document.getElementById('questionCount');
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedback = document.getElementById('feedback');
        const scoreElement = document.getElementById('score');
        const resultModal = document.getElementById('resultModal');
        const finalScore = document.getElementById('finalScore');
        const accuracy = document.getElementById('accuracy');
        const timeSpent = document.getElementById('timeSpent');

        // 事件监听器
        startBtn.addEventListener('click', startGame);
        nextBtn.addEventListener('click', nextQuestion);
        restartBtn.addEventListener('click', restartGame);
        playAgainBtn.addEventListener('click', restartGame);

        // 开始游戏
        function startGame() {
            // 随机选择20道题
            currentQuestions = shuffleArray([...questionBank]).slice(0, 20);
            currentQuestionIndex = 0;
            score = 0;
            gameStarted = true;
            startTime = new Date().getTime();

            // 更新UI
            startBtn.disabled = true;
            startBtn.style.display = 'none';
            nextBtn.disabled = false;
            restartBtn.disabled = false;
            scoreElement.textContent = score;
            questionCount.textContent = `${currentQuestionIndex + 1}/20`;
            questionNumber.textContent = `第 ${currentQuestionIndex + 1} 题`;

            // 显示第一题
            showQuestion();
        }

        // 显示当前题目
        function showQuestion() {
            const currentQuestion = currentQuestions[currentQuestionIndex];
            questionText.textContent = currentQuestion.english;
            questionCount.textContent = `${currentQuestionIndex + 1}/20`;
            questionNumber.textContent = `第 ${currentQuestionIndex + 1} 题`;
            feedback.style.display = 'none';
            answerSelected = false;

            // 生成选项
            generateOptions(currentQuestion);
        }

        // 生成选项
        function generateOptions(currentQuestion) {
            optionsContainer.innerHTML = '';

            // 获取4个选项，包括正确答案
            const options = [currentQuestion.chinese];
            
            // 从题库中随机选择3个不同的翻译作为干扰项
            while (options.length < 4) {
                const randomQuestion = questionBank[Math.floor(Math.random() * questionBank.length)];
                if (!options.includes(randomQuestion.chinese)) {
                    options.push(randomQuestion.chinese);
                }
            }

            // 打乱选项顺序
            const shuffledOptions = shuffleArray(options);

            // 创建选项按钮
            shuffledOptions.forEach(option => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.addEventListener('click', () => checkAnswer(option, currentQuestion.chinese));
                optionsContainer.appendChild(optionElement);
            });
        }

        // 检查答案
        function checkAnswer(selectedOption, correctAnswer) {
            if (!gameStarted) return;

            answerSelected = true;
            
            // 禁用所有选项
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.removeEventListener('click', checkAnswer);
                if (option.textContent === correctAnswer) {
                    option.classList.add('correct');
                } else if (option.textContent === selectedOption) {
                    option.classList.add('incorrect');
                }
            });

            // 显示反馈
            if (selectedOption === correctAnswer) {
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ 正确！';
                score += 5; // 每题5分
                scoreElement.textContent = score;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.textContent = `❌ 错误！正确答案是：${correctAnswer}`;
            }

            // 如果是最后一题，显示结果
            if (currentQuestionIndex === currentQuestions.length - 1) {
                endTime = new Date().getTime();
                showResult();
            }
        }

        // 下一题
        function nextQuestion() {
            if (!answerSelected) {
                alert('请先选择一个答案！');
                return;
            }
            
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            }
        }

        // 重新开始游戏
        function restartGame() {
            resultModal.style.display = 'none';
            startGame();
        }

        // 显示游戏结果
        function showResult() {
            const totalTime = Math.round((endTime - startTime) / 1000);
            const correctAnswers = score / 5;
            const accuracyPercentage = Math.round((correctAnswers / 20) * 100);

            finalScore.textContent = score;
            accuracy.textContent = accuracyPercentage;
            timeSpent.textContent = totalTime;
            resultModal.style.display = 'flex';
        }

        // 打乱数组
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
