    <title>🧩 单词排序游戏 - 英语语法学习乐园</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="game_index.html" class="back-btn">⬅ 返回</a>
            <button class="play-audio-btn" id="play-audio-btn" style="display: none;">🔊</button>
            <h1>🧩 单词排序游戏</h1>
            <p>点击单词，将它们拖放到正确的位置，完成句子！</p>
        </div>

        <div class="game-info">
            <div class="progress">
                <div class="progress-info">
                    题目: <span id="current-question">1</span>/20

                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            <div class="error-count">
                错误: <span id="error-count">0</span>
            </div>
            <div class="score">
                分数: <span id="score">0</span>
            </div>
        </div>

        <div class="game-content">
            <div class="question" id="question">
                <div class="sentence" id="sentence">
                    <!-- 空格将通过JavaScript动态生成 -->
                </div>
                <div class="word-bank">
                    <h3>单词库</h3>
                    <div class="words" id="words">
                        <!-- 单词将通过JavaScript动态生成 -->
                    </div>
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="translation" id="translation" style="display: none;">
                    <div class="translation-content" id="translation-content"></div>
                </div>
                <button class="next-btn" id="next-btn">下一题</button>
                <button class="restart-btn" id="game-restart-btn" style="display: inline-block; margin-left: 10px;">重新开始</button>
            </div>

            <div class="result" id="result">
                <h2>🎉 游戏完成！</h2>
                <div class="result-score" id="result-score">0</div>
                <div class="result-message" id="result-message"></div>
                <button class="restart-btn" id="restart-btn">再玩一次</button>
                <a href="game_index.html" class="home-btn">返回游戏列表</a>
            </div>
        </div>
    </div>

        // 随机选择20道题
        function getRandomQuestions() {
            const shuffled = [...sentences].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 20);
        }

        let questions = getRandomQuestions();
        let currentQuestion = 0;
        let score = 0;
        let errorCount = 0;
        let answered = false;
        let selectedWord = null;

        // 初始化游戏
        function initGame() {
            questions = getRandomQuestions();
            currentQuestion = 0;
            score = 0;
            errorCount = 0;
            answered = false;
            document.getElementById('current-question').textContent = 1;
            document.getElementById('score').textContent = 0;
            document.getElementById('error-count').textContent = 0;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('result').style.display = 'none';
            document.getElementById('question').style.display = 'block';
            loadQuestion();
        }

        // 加载题目
        function loadQuestion() {
            const sentence = questions[currentQuestion];
            
            // 拆分句子为单词
            const words = sentence.split(' ');
            
            // 打乱单词顺序
            const shuffledWords = [...words].sort(() => Math.random() - 0.5);
            
            // 生成句子空格
            const sentenceElement = document.getElementById('sentence');
            sentenceElement.innerHTML = '';
            
            words.forEach((word, index) => {
                const blank = document.createElement('div');
                blank.className = 'blank';
                blank.dataset.index = index;
                blank.addEventListener('click', function() {
                    if (answered) return;
                    if (blank.classList.contains('filled')) {
                        // 如果已填充，则移除单词
                        removeWord(blank);
                    } else if (selectedWord) {
                        // 如果未填充且有选中的单词，则放置单词
                        placeWord(blank);
                    }
                });
                sentenceElement.appendChild(blank);
            });
            
            // 生成单词库
            const wordsElement = document.getElementById('words');
            wordsElement.innerHTML = '';
            
            shuffledWords.forEach((word, index) => {
                const wordElement = document.createElement('div');
                wordElement.className = 'word';
                wordElement.textContent = word;
                wordElement.dataset.word = word;
                wordElement.dataset.index = index;
                wordElement.addEventListener('click', () => selectWord(wordElement));
                wordsElement.appendChild(wordElement);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('translation').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('play-audio-btn').style.display = 'none';
            answered = false;
            selectedWord = null;
        }

        // 从空白处移除单词
        function removeWord(blank) {
            if (answered) return;
            
            const word = blank.textContent;
            
            // 清空空白处
            blank.textContent = '';
            blank.classList.remove('filled');
            
            // 找到对应的单词并恢复
            const wordElements = document.querySelectorAll('.word');
            wordElements.forEach(wordElement => {
                if (wordElement.dataset.word === word && wordElement.classList.contains('used')) {
                    wordElement.classList.remove('used');
                }
            });
        }

        // 选择单词
        function selectWord(wordElement) {
            if (answered) return;
            
            // 移除之前的选中状态
            document.querySelectorAll('.word').forEach(w => w.classList.remove('selected'));
            
            // 添加选中状态
            wordElement.classList.add('selected');
            selectedWord = wordElement;
        }

        // 放置单词到空格
        function placeWord(blank) {
            if (!selectedWord || answered) return;
            
            const word = selectedWord.dataset.word;
            const blankIndex = parseInt(blank.dataset.index);
            
            // 填充空格
            blank.textContent = word;
            blank.classList.add('filled');
            
            // 标记单词为已使用
            selectedWord.classList.add('used');
            selectedWord.classList.remove('selected');
            
            // 检查是否所有空格都已填充
            const blanks = document.querySelectorAll('.blank');
            const allFilled = Array.from(blanks).every(blank => blank.classList.contains('filled'));
            
            if (allFilled) {
                checkAnswer();
            }
            
            selectedWord = null;
        }

        // 播放语音
        function playAudio(text) {
            const audioPath = audioMapping[text];
            if (audioPath) {
                const audio = new Audio(audioPath);
                audio.play().catch(error => {
                    console.error('音频播放失败:', error);
                });
            }
        }

        // 检查答案
        function checkAnswer() {
            const blanks = document.querySelectorAll('.blank');
            const userAnswer = Array.from(blanks).map(blank => blank.textContent).join(' ');
            const correctAnswer = questions[currentQuestion];
            
            const feedback = document.getElementById('feedback');
            if (userAnswer === correctAnswer) {
                score += 5; // 每题5分
                document.getElementById('score').textContent = score;
                feedback.textContent = '🎉 回答正确！';
                feedback.className = 'feedback correct';
                createConfetti();
            } else {
                errorCount++; // 增加错误次数
                document.getElementById('error-count').textContent = errorCount;
                feedback.textContent = `❌ 回答错误！正确答案是: ${correctAnswer}`;
                feedback.className = 'feedback incorrect';
            }
            
            feedback.style.display = 'block';
            
            // 显示翻译和播放音频
            const translation = getTranslation(correctAnswer);
            document.getElementById('translation-content').innerHTML = `
                <strong>中文翻译：</strong>${translation}
            `;
            document.getElementById('translation').style.display = 'block';
            
            // 播放语音
            playAudio(correctAnswer);
            
            // 显示音频播放按钮
            document.getElementById('play-audio-btn').style.display = 'flex';
            
            document.getElementById('next-btn').style.display = 'inline-block';
            answered = true;
        }

        // 创建庆祝效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                // 3秒后移除
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 下一题
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                document.getElementById('current-question').textContent = currentQuestion + 1;
                document.getElementById('progress-fill').style.width = ((currentQuestion / questions.length) * 100) + '%';
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-score').textContent = score;
            
            const message = document.getElementById('result-message');
            if (score === 100) {
                message.textContent = '太棒了！你是单词排序大师！';
                createConfetti();
            } else if (score >= 80) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= 60) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
        }

        // 播放音频按钮点击事件
        document.getElementById('play-audio-btn').addEventListener('click', function() {
            const correctAnswer = questions[currentQuestion];
            playAudio(correctAnswer);
        });

        // 事件监听
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('game-restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        initGame();
