        // 为每个问题生成错误选项
        function generateDistractors(correctAnswer, category) {
            const distractors = [];
            const sameCategoryQuestions = dataSource.filter(item => item.category === category && item.correctAnswer !== correctAnswer);
            
            // 从同类别中选择错误选项
            while (distractors.length < 3 && sameCategoryQuestions.length > 0) {
                const randomIndex = Math.floor(Math.random() * sameCategoryQuestions.length);
                const distractor = sameCategoryQuestions[randomIndex].correctAnswer;
                if (!distractors.includes(distractor)) {
                    distractors.push(distractor);
                }
                sameCategoryQuestions.splice(randomIndex, 1);
            }
            
            // 如果同类别选项不够，从其他类别选择
            if (distractors.length < 3) {
                const otherCategoryQuestions = dataSource.filter(item => item.category !== category && item.correctAnswer !== correctAnswer);
                while (distractors.length < 3 && otherCategoryQuestions.length > 0) {
                    const randomIndex = Math.floor(Math.random() * otherCategoryQuestions.length);
                    const distractor = otherCategoryQuestions[randomIndex].correctAnswer;
                    if (!distractors.includes(distractor)) {
                        distractors.push(distractor);
                    }
                    otherCategoryQuestions.splice(randomIndex, 1);
                }
            }
            
            return distractors;
        }

        // 从每个分类中选择题目，确保覆盖所有分类
        function selectQuestions() {
            const categoryCount = {};
            const selectedQuestions = [];
            const shuffledData = [...dataSource].sort(() => Math.random() - 0.5);
            
            // 首先从每个分类中至少选择一道题
            const categories = [...new Set(dataSource.map(item => item.category))];
            categories.forEach(category => {
                const categoryQuestions = shuffledData.filter(item => item.category === category);
                if (categoryQuestions.length > 0) {
                    const question = categoryQuestions[0];
                    selectedQuestions.push(question);
                    categoryCount[category] = 1;
                }
            });
            
            // 填充剩余的题目
            let remaining = 20 - selectedQuestions.length;
            let i = 0;
            while (remaining > 0 && i < shuffledData.length) {
                const question = shuffledData[i];
                if (!selectedQuestions.includes(question)) {
                    selectedQuestions.push(question);
                    categoryCount[question.category] = (categoryCount[question.category] || 0) + 1;
                    remaining--;
                }
                i++;
            }
            
            return selectedQuestions;
        }

        // 游戏变量
        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let startTime = 0;
        let correctAnswers = 0;

        // 初始化游戏
        function initGame() {
            questions = selectQuestions();
            currentQuestion = 0;
            score = 0;
            answered = false;
            correctAnswers = 0;
            startTime = Date.now(); // 记录开始时间
            document.getElementById('current-question').textContent = 1;
            document.getElementById('question-number').textContent = 1;
            document.getElementById('score').textContent = 0;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('result').style.display = 'none';
            document.getElementById('question').style.display = 'block';
            loadQuestion();
        }

        // 加载题目
        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-text').textContent = question.question;
            document.getElementById('current-question').textContent = currentQuestion + 1;
            document.getElementById('question-number').textContent = currentQuestion + 1;
            
            // 生成选项
            const correctAnswer = question.correctAnswer;
            const distractors = generateDistractors(correctAnswer, question.category);
            const options = [correctAnswer, ...distractors].sort(() => Math.random() - 0.5);
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            options.forEach(option => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.addEventListener('click', () => selectOption(optionElement));
                optionsContainer.appendChild(optionElement);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('translation').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('play-audio-btn').style.display = 'none';
            answered = false;
        }

        // 选择选项
        function selectOption(selectedOption) {
            if (answered) return;
            
            const question = questions[currentQuestion];
            const correctAnswer = question.correctAnswer;
            
            // 禁用所有选项
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.removeEventListener('click', selectOption);
                if (option.textContent === correctAnswer) {
                    option.classList.add('correct');
                } else if (option === selectedOption && option.textContent !== correctAnswer) {
                    option.classList.add('incorrect');
                }
            });
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            if (selectedOption.textContent === correctAnswer) {
                score += 5; // 每题5分
                correctAnswers++; // 增加正确答案计数
                document.getElementById('score').textContent = score;
                feedback.textContent = '🎉 回答正确！';
                feedback.className = 'feedback correct';
            } else {
                feedback.textContent = `❌ 回答错误！正确答案是: ${correctAnswer}`;
                feedback.className = 'feedback incorrect';
            }
            
            feedback.style.display = 'block';
            
            // 显示翻译
            document.getElementById('translation-content').innerHTML = `
                <strong>中文问句：</strong>${question.chineseQuestion}<br>
                <strong>中文答句：</strong>${question.chineseAnswer}
            `;
            document.getElementById('translation').style.display = 'block';
            
            // 播放语音
            playAudio(question.question, question.correctAnswer);
            
            // 显示音频播放按钮
            document.getElementById('play-audio-btn').style.display = 'flex';
            
            document.getElementById('next-btn').style.display = 'inline-block';
            answered = true;
        }

        // 音频文件映射
        const audioMapping = {
            "How are you today?": "voice/game_qa/question_0.mp3",
            "I'm fine.": "voice/game_qa/answer_0.mp3",
            "What's your name?": "voice/game_qa/question_1.mp3",
            "My name is Tom.": "voice/game_qa/answer_1.mp3",
            "How old are you?": "voice/game_qa/question_2.mp3",
            "I'm ten years old.": "voice/game_qa/answer_2.mp3",
            "Where are you from?": "voice/game_qa/question_3.mp3",
            "I'm from China.": "voice/game_qa/answer_3.mp3",
            "Nice to meet you.": "voice/game_qa/question_4.mp3",
            "Nice to meet you, too.": "voice/game_qa/answer_4.mp3",
            "How do you do?": "voice/game_qa/question_5.mp3",
            "How do you do?": "voice/game_qa/answer_5.mp3",
            "Where do you live?": "voice/game_qa/question_6.mp3",
            "I live in China.": "voice/game_qa/answer_6.mp3",
            "What's your favorite subject?": "voice/game_qa/question_7.mp3",
            "My favorite subject is English.": "voice/game_qa/answer_7.mp3",
            "What's in your schoolbag?": "voice/game_qa/question_8.mp3",
            "A book and a pencil.": "voice/game_qa/answer_8.mp3"
        };

        // 播放音频
        function playAudio(question, answer) {
            // 尝试使用本地MP3文件播放问题
            const questionAudioPath = audioMapping[question];
            if (questionAudioPath) {
                const questionAudio = new Audio(questionAudioPath);
                questionAudio.play().catch(error => {
                    console.error('播放问题音频失败:', error);
                    // 如果本地音频播放失败，回退到Web Speech API
                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(question);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.7;
                        utterance.pitch = 1.0;
                        utterance.volume = 1.0;
                        speechSynthesis.speak(utterance);
                    }
                });
            } else {
                // 如果没有本地音频文件，使用Web Speech API
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(question);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.7;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    speechSynthesis.speak(utterance);
                }
            }
            
            // 延迟播放答案
            setTimeout(() => {
                // 尝试使用本地MP3文件播放答案
                const answerAudioPath = audioMapping[answer];
                if (answerAudioPath) {
                    const answerAudio = new Audio(answerAudioPath);
                    answerAudio.play().catch(error => {
                        console.error('播放答案音频失败:', error);
                        // 如果本地音频播放失败，回退到Web Speech API
                        if ('speechSynthesis' in window) {
                            const utterance = new SpeechSynthesisUtterance(answer);
                            utterance.lang = 'en-US';
                            utterance.rate = 0.7;
                            utterance.pitch = 1.0;
                            utterance.volume = 1.0;
                            speechSynthesis.speak(utterance);
                        }
                    });
                } else {
                    // 如果没有本地音频文件，使用Web Speech API
                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(answer);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.7;
                        utterance.pitch = 1.0;
                        utterance.volume = 1.0;
                        speechSynthesis.speak(utterance);
                    }
                }
            }, 1500); // 延迟1.5秒播放答案
        }

        // 创建庆祝效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                // 3秒后移除
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 下一题
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                document.getElementById('progress-fill').style.width = ((currentQuestion / questions.length) * 100) + '%';
                loadQuestion();
            } else {
                document.getElementById('progress-fill').style.width = '100%';
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-score').textContent = score;
            
            // 计算正确率、错误率和总耗时
            const totalQuestions = questions.length;
            const accuracy = ((correctAnswers / totalQuestions) * 100).toFixed(0);
            const errorRate = (( (totalQuestions - correctAnswers) / totalQuestions) * 100).toFixed(0);
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(duration / 60);
            const seconds = duration % 60;
            const formattedDuration = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 显示统计信息
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            document.getElementById('error-rate').textContent = `${errorRate}%`;
            document.getElementById('duration').textContent = formattedDuration;
            
            const message = document.getElementById('result-message');
            if (score === 100) {
                message.textContent = '太棒了！你是英语问答大师！';
            } else if (score >= 80) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= 60) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
        }

        // 事件监听
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('game-restart-btn').addEventListener('click', initGame);
        document.getElementById('play-audio-btn').addEventListener('click', function() {
            if (currentQuestion < questions.length) {
                playAudio(questions[currentQuestion].question, questions[currentQuestion].correctAnswer);
            }
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
