<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 翻版记忆短语 - 英语语法学习乐园</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/common.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="game_index.html" class="back-btn">⬅ 返回</a>
            <h1>🧠 翻版记忆短语</h1>
            <p>翻开卡片，找到英文和中文对应的短语，锻炼你的记忆力！</p>
        </div>

        <div class="game-info">
            <div class="score">
                分数: <span id="score">0</span>
            </div>
            <div class="time">
                总耗时: <span id="game-time">00:00</span>
            </div>
        </div>

        <div class="game-content">
            <div class="memory-game-board" id="game-board">
                <!-- 卡片将通过JavaScript动态生成 -->
            </div>

            <div class="error-message" id="error-message"></div>

            <div class="controls">
                <button class="start-btn" id="start-btn">开始游戏</button>
                <button class="restart-btn" id="restart-btn" style="display: none;">重新开始</button>
                <button class="give-up-btn" id="give-up-btn" style="display: none;">放弃</button>
            </div>

            <div class="result" id="result">
                <h2>🎉 游戏结束！</h2>
                <div class="result-score" id="result-score">0</div>
                <div class="result-message" id="result-message"></div>
                <button class="restart-btn" id="result-restart-btn" style="display: none;">再玩一次</button>
                <a href="game_index.html" class="home-btn">返回游戏列表</a>
            </div>
        </div>
    </div>

    <script>
        let phrasesData = [];

        // 从API获取数据
        async function loadGameData() {
            try {
                const response = await fetch(`${API_BASE_URL}/game/game_memory`);
                if (!response.ok) {
                    throw new Error('Failed to load game data');
                }
                phrasesData = await response.json();
                initGame(phrasesData);
            } catch (error) {
                console.error('Error loading game data:', error);
                alert('加载游戏数据失败，请刷新页面重试');
            }
        }

        // 播放音频
        async function playAudio(text) {
            try {
                const response = await fetch(`${API_BASE_URL}/tts?text=${encodeURIComponent(text)}&game=game_memory`);
                
                if (!response.ok) {
                    throw new Error('Failed to generate speech');
                }
                
                const audioBlob = await response.blob();
                
                // 创建音频对象并播放
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                await audio.play();
                
                // 释放URL对象
                setTimeout(() => URL.revokeObjectURL(audioUrl), 1000);
            } catch (error) {
                console.error('播放音频失败:', error);
            }
        }

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let score = 0;
        let gameStarted = false;
        let gameStartTime = 0;
        let gameEndTime = 0;
        let timerInterval = null;

        // 初始化游戏
        function initGame(data = phrasesData) {
            // 随机选择10个短语（20张卡片，4行5列）
            const shuffledPhrases = [...data].sort(() => Math.random() - 0.5);
            const selectedPhrases = shuffledPhrases.slice(0, 10);
            
            // 创建英文卡片数组
            const englishCards = [];
            selectedPhrases.forEach(phrase => {
                englishCards.push({
                    id: Math.random().toString(36).substr(2, 9),
                    text: phrase.english,
                    type: 'english',
                    matchId: phrase.english
                });
            });
            
            // 创建中文卡片数组
            const chineseCards = [];
            selectedPhrases.forEach(phrase => {
                chineseCards.push({
                    id: Math.random().toString(36).substr(2, 9),
                    text: phrase.chinese,
                    type: 'chinese',
                    matchId: phrase.english
                });
            });
            
            // 打乱英文卡片顺序
            englishCards.sort(() => Math.random() - 0.5);
            
            // 打乱中文卡片顺序
            chineseCards.sort(() => Math.random() - 0.5);
            
            // 合并卡片数组：先添加英文卡片（第1和第2行），再添加中文卡片（第3和第4行）
            cards = [...englishCards, ...chineseCards];
            
            // 重置游戏状态
            flippedCards = [];
            matchedPairs = 0;
            score = 0;
            gameStarted = false;
            
            // 更新UI
            document.getElementById('score').textContent = score;
            document.getElementById('game-time').textContent = '00:00';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('restart-btn').style.display = 'none';
            document.getElementById('give-up-btn').style.display = 'none';
            
            // 清除计时器
            clearInterval(timerInterval);
            
            // 生成游戏板
            generateGameBoard();
        }

        // 生成游戏板
        function generateGameBoard() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            
            cards.forEach((card, index) => {
                // 在第2行和第3行之间添加分隔线（即第10张卡片后）
                if (index === 10) {
                    const divider = document.createElement('div');
                    divider.className = 'memory-board-divider';
                    gameBoard.appendChild(divider);
                }
                
                const cardElement = document.createElement('div');
                cardElement.className = 'memory-card';
                cardElement.dataset.id = card.id;
                cardElement.dataset.matchId = card.matchId;
                cardElement.dataset.type = card.type;
                
                const cardContent = document.createElement('div');
                cardContent.className = 'card-content';
                cardContent.textContent = card.text;
                
                cardElement.appendChild(cardContent);
                
                // 英文卡片默认是背面
                if (card.type === 'english') {
                    cardElement.addEventListener('click', () => flipCard(cardElement));
                } 
                // 中文卡片默认是正面（明牌）
                else {
                    cardElement.classList.add('flipped');
                    cardElement.classList.add('chinese-card');
                    // 中文卡片也需要点击事件监听器，用于匹配
                    cardElement.addEventListener('click', () => flipCard(cardElement));
                }
                
                gameBoard.appendChild(cardElement);
            });
        }



        // 翻转卡片
        function flipCard(card) {
            if (!gameStarted) {
                // 显示提示弹窗
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>提示</h3>
                        <p>请先点击「开始游戏」按钮</p>
                        <button class="start-btn" id="modal-start-btn">开始游戏</button>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 添加事件监听
                document.getElementById('modal-start-btn').addEventListener('click', () => {
                    modal.remove();
                    startGame();
                });
                return;
            }
            
            // 检查卡片是否已经匹配或翻转
            if (card.classList.contains('matched')) return;
            
            // 如果是英文卡片
            if (card.dataset.type === 'english') {
                if (card.classList.contains('flipped')) return;
                if (flippedCards.length >= 1) return; // 只允许翻转一张英文卡片
                
                card.classList.add('flipped');
                flippedCards.push(card);
                
                // 播放卡片内容的语音
                const cardText = card.querySelector('.card-content').textContent;
                playAudio(cardText);
            }
            // 如果是中文卡片
            else if (card.dataset.type === 'chinese') {
                if (flippedCards.length !== 1) return; // 必须先翻转一张英文卡片
                
                const englishCard = flippedCards[0];
                const englishMatchId = englishCard.dataset.matchId;
                const chineseMatchId = card.dataset.matchId;
                
                // 检查是否匹配
                if (englishMatchId === chineseMatchId) {
                    // 匹配成功
                    englishCard.classList.add('matched');
                    card.classList.add('matched');
                    matchedPairs++;
                    score += 10;
                    document.getElementById('score').textContent = score;
                    createConfetti();
                    
                    // 隐藏错误消息
                    document.getElementById('error-message').style.display = 'none';
                    
                    // 检查游戏是否结束
                    if (matchedPairs === cards.length / 2) {
                        endGame();
                    }
                } else {
                    // 匹配失败
                    englishCard.classList.remove('flipped');
                    
                    // 显示错误消息
                    const errorMessage = document.getElementById('error-message');
                    errorMessage.textContent = '❌ 匹配错误！再试一次';
                    errorMessage.style.display = 'block';
                    
                    // 2秒后隐藏错误消息
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                    }, 2000);
                }
                
                flippedCards = [];
            }
        }

        // 创建庆祝效果
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(confetti);
                
                // 3秒后移除
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 开始游戏
        function startGame() {
            gameStarted = true;
            gameStartTime = Date.now();
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'inline-block';
            document.getElementById('give-up-btn').style.display = 'inline-block';
            
            // 启动计时器
            startTimer();
        }
        
        // 启动计时器
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsedTime = Math.round((Date.now() - gameStartTime) / 1000);
                const minutes = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
                const seconds = (elapsedTime % 60).toString().padStart(2, '0');
                document.getElementById('game-time').textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        // 结束游戏
        function endGame() {
            gameStarted = false;
            clearInterval(timerInterval);
            gameEndTime = Date.now();
            const gameTime = Math.round((gameEndTime - gameStartTime) / 1000);
            
            // 计算用时
            const minutes = Math.floor(gameTime / 60);
            const seconds = gameTime % 60;
            const timeString = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
            
            // 创建弹窗
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🎉 游戏结束！</h2>
                    <div class="modal-score">${score}</div>
                    <div class="modal-time">用时：${timeString}</div>
                    <div class="modal-message"></div>
                    <div class="modal-buttons">
                        <button class="restart-btn" id="modal-restart-btn" style="display: none;">再玩一次</button>
                        <button class="home-btn" id="modal-home-btn">返回游戏列表</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 设置消息
            const message = modal.querySelector('.modal-message');
            if (score === cards.length / 2 * 10) {
                message.textContent = '太棒了！你是记忆大师！';
                createConfetti();
            } else if (score >= cards.length / 2 * 10 * 0.7) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= cards.length / 2 * 10 * 0.5) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
            
            // 添加事件监听
            document.getElementById('modal-restart-btn').addEventListener('click', () => {
                modal.remove();
                initGame();
            });
            
            document.getElementById('modal-home-btn').addEventListener('click', () => {
                window.location.href = 'game_index.html';
            });
        }

        // 放弃游戏
        function giveUpGame() {
            // 打开所有卡片
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                card.classList.add('flipped');
            });
        }

        // 事件监听
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', initGame);
        document.getElementById('give-up-btn').addEventListener('click', giveUpGame);
        document.getElementById('result-restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        loadGameData();
    </script>
</body>
</html>
