<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 打卡记录 - 英语语法学习乐园</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="my.html" class="back-btn">⬅ 返回</a>
            <h1>📅 打卡记录</h1>
        </div>
        
        <div class="checkin-list-container">
            <h2>我的打卡日期</h2>
            <div class="checkin-list" id="checkin-list">
                <!-- 打卡记录将通过JavaScript动态生成 -->
            </div>
            
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-state-icon">📅</div>
                <h3>还没有打卡记录</h3>
                <p>开始学习并打卡，记录你的学习历程！</p>
            </div>
            

        </div>
    </div>
    
    <script src="js/common.js"></script>
    <script>
        // 加载打卡记录
        async function loadCheckinList() {
            try {
                const response = await fetch(`${API_BASE_URL}/checkin/records`);
                if (response.ok) {
                    const data = await response.json();
                    const checkinDates = data.records || [];
                    const checkinList = document.getElementById('checkin-list');
                    const emptyState = document.getElementById('empty-state');
                    
                    if (checkinDates.length === 0) {
                        checkinList.style.display = 'none';
                        emptyState.style.display = 'block';
                    } else {
                        checkinList.style.display = 'block';
                        emptyState.style.display = 'none';
                        
                        // 清空列表
                        checkinList.innerHTML = '';
                        
                        // 按日期倒序排序
                        checkinDates.sort((a, b) => new Date(b.date) - new Date(a.date));
                        
                        // 生成打卡记录
                        checkinDates.forEach(record => {
                            const checkinItem = document.createElement('div');
                            checkinItem.className = 'checkin-item';
                            
                            // 格式化日期显示
                            const formattedDate = new Date(record.date).toLocaleDateString('zh-CN', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit'
                            });
                            
                            // 格式化时间显示
                            const formattedTime = new Date(record.timestamp).toLocaleTimeString('zh-CN', {
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                            
                            checkinItem.innerHTML = `
                                <div>
                                    <div class="checkin-date">${formattedDate}</div>
                                    <div style="font-size: 14px; color: #666;">${formattedTime}</div>
                                </div>
                                <div class="checkin-status">已打卡</div>
                            `;
                            
                            checkinList.appendChild(checkinItem);
                        });
                    }
                }
            } catch (error) {
                console.error('加载打卡记录失败:', error);
            }
        }
        
        // 页面加载时加载打卡记录
        window.onload = loadCheckinList;
    </script>
</body>
</html>
