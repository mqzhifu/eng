<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❓ 疑问句翻译游戏 - 英语语法学习乐园</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/common.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="game_index.html" class="back-btn">⬅ 返回</a>
            <button class="play-audio-btn" id="play-audio-btn">🔊</button>
            <h1>❓ 疑问句翻译游戏</h1>
            <p>选择正确的中文翻译，一共20道题，满分100分！</p>
        </div>

        <div class="game-info">
            <div class="progress">
                <div class="progress-info">
                    题目: <span id="current-question">1</span>/20
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            <div class="error-count">
                错误: <span id="error-count">0</span>
            </div>
            <div class="score">
                分数: <span id="score">0</span>
            </div>
        </div>

        <div class="game-content">
            <div class="question" id="question">
                <div class="sentence" id="sentence">
                    What's your name?
                </div>
                <div class="options" id="options">
                    <div class="option" data-answer="你叫什么名字？">你叫什么名字？</div>
                    <div class="option" data-answer="你多大了？">你多大了？</div>
                    <div class="option" data-answer="你好吗？">你好吗？</div>
                    <div class="option" data-answer="你来自哪里？">你来自哪里？</div>
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="translation" id="translation">
                    <div class="translation-content" id="translation-content"></div>
                </div>
                <button class="next-btn" id="next-btn">下一题</button>
                <button class="restart-btn" id="game-restart-btn" style="display: none; margin-left: 10px;">重新开始</button>
            </div>

            <div class="result" id="result">
                <h2>🎉 游戏完成！</h2>
                <div class="result-score" id="result-score">0</div>
                <div class="result-message" id="result-message"></div>
                <div class="result-stats" id="result-stats">
                    <div class="stat-item">
                        <span class="stat-label">正确率：</span>
                        <span class="stat-value" id="accuracy">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">错误率：</span>
                        <span class="stat-value" id="error-rate">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总耗时：</span>
                        <span class="stat-value" id="duration">00:00</span>
                    </div>
                </div>
                <button class="restart-btn" id="restart-btn" style="display: none;">再玩一次</button>
            </div>
            <div class="ice-princess" id="ice-princess">

                </svg>
                <div class="princess-face" id="princess-face">😊</div>
                <div class="snowflakes" id="snowflakes"></div>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let allQuestions = [];
        
        // 从后端加载游戏数据
        function loadGameData() {
            fetch(`${API_BASE_URL}/game/game_translate`)
                .then(response => response.json())
                .then(data => {
                    allQuestions = data.questions;
                    questions = getRandomQuestions();
                    initGame();
                })
                .catch(error => {
                    console.error('加载游戏数据失败:', error);
                    // 使用默认数据作为 fallback
                    questions = getDefaultQuestions();
                    initGame();
                });
        }
        
        // 随机选择20道题，尽量从每个分类都选一些
        function getRandomQuestions() {
            // 按类型分组
            const questionsByType = {
                what: allQuestions.filter(q => q.english.startsWith('What')),
                who: allQuestions.filter(q => q.english.startsWith('Who')),
                where: allQuestions.filter(q => q.english.startsWith('Where')),
                when: allQuestions.filter(q => q.english.startsWith('When')),
                why: allQuestions.filter(q => q.english.startsWith('Why')),
                which: allQuestions.filter(q => q.english.startsWith('Which')),
                how: allQuestions.filter(q => q.english.startsWith('How'))
            };
            
            const selectedQuestions = [];
            const types = Object.keys(questionsByType);
            
            // 从每个类型中至少选2道题
            types.forEach(type => {
                const typeQuestions = questionsByType[type];
                const shuffled = [...typeQuestions].sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, 2);
                selectedQuestions.push(...selected);
            });
            
            // 剩下的题从所有题中随机选择
            const remaining = 20 - selectedQuestions.length;
            const allShuffled = [...allQuestions].sort(() => Math.random() - 0.5);
            const additional = allShuffled.filter(q => !selectedQuestions.includes(q)).slice(0, remaining);
            selectedQuestions.push(...additional);
            
            // 再次打乱顺序
            return selectedQuestions.sort(() => Math.random() - 0.5);
        }
        
        // 默认数据作为 fallback
        function getDefaultQuestions() {
            return [
                { english: "What's your name?", chinese: "你叫什么名字？" },
                { english: "What are you doing?", chinese: "你在做什么？" },
                { english: "What color is your bag?", chinese: "你的书包是什么颜色？" },
                { english: "What do you like to eat?", chinese: "你喜欢吃什么？" },
                { english: "What time is it?", chinese: "现在几点了？" },
                { english: "Who is that girl?", chinese: "那个女孩是谁？" },
                { english: "Who is your English teacher?", chinese: "你的英语老师是谁？" },
                { english: "Who can help me?", chinese: "谁能帮助我？" },
                { english: "Where is my pencil?", chinese: "我的铅笔在哪里？" },
                { english: "Where are you from?", chinese: "你来自哪里？" },
                { english: "Where do you live?", chinese: "你住在哪里？" },
                { english: "When do you get up?", chinese: "你什么时候起床？" },
                { english: "When is your birthday?", chinese: "你的生日是什么时候？" },
                { english: "When do you go to school?", chinese: "你什么时候去上学？" },
                { english: "Why are you late?", chinese: "你为什么迟到？" },
                { english: "Why do you like dogs?", chinese: "你为什么喜欢狗？" },
                { english: "Which do you like best?", chinese: "你最喜欢哪一个？" },
                { english: "Which is your pen?", chinese: "哪一支是你的钢笔？" },
                { english: "How are you?", chinese: "你好吗？" },
                { english: "How do you go to school?", chinese: "你怎么去上学？" }
            ];
        }

        let currentQuestion = 0;
        let score = 0;
        let errorCount = 0;
        let answered = false;
        let startTime = 0;
        let correctAnswers = 0;

        // 初始化游戏
        function initGame() {
            // 重新随机选择20道题
            questions = getRandomQuestions();
            currentQuestion = 0;
            score = 0;
            errorCount = 0;
            answered = false;
            correctAnswers = 0;
            startTime = Date.now(); // 记录开始时间
            document.getElementById('current-question').textContent = 1;
            document.getElementById('score').textContent = 0;
            document.getElementById('error-count').textContent = 0;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('result').style.display = 'none';
            document.getElementById('question').style.display = 'block';
            loadQuestion();
        }

        // 加载题目
        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('sentence').textContent = question.english;
            
            // 生成选项：1个正确答案，3个错误答案
            const correctAnswer = question.chinese;
            const allChineseAnswers = allQuestions.map(q => q.chinese);
            const wrongAnswers = allChineseAnswers.filter(answer => answer !== correctAnswer);
            
            // 随机选择3个错误答案
            const shuffledWrongAnswers = wrongAnswers.sort(() => Math.random() - 0.5);
            const selectedWrongAnswers = shuffledWrongAnswers.slice(0, 3);
            
            // 合并选项并打乱顺序
            const options = [correctAnswer, ...selectedWrongAnswers].sort(() => Math.random() - 0.5);
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            options.forEach(option => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.dataset.answer = option;
                optionElement.addEventListener('click', selectOption);
                optionsContainer.appendChild(optionElement);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('translation').style.display = 'none';
            answered = false;
        }

        // 选择选项
        function selectOption(e) {
            if (answered) return;
            
            const selectedOption = e.target;
            const question = questions[currentQuestion];
            const correctAnswer = question.chinese;
            
            // 禁用所有选项
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.removeEventListener('click', selectOption);
                if (option.dataset.answer === correctAnswer) {
                    option.classList.add('correct');
                    if (option === selectedOption) {
                        animateOption(option, true);
                    }
                } else if (option === selectedOption && option.dataset.answer !== correctAnswer) {
                    option.classList.add('incorrect');
                    animateOption(option, false);
                }
            });
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            const icePrincess = document.getElementById('ice-princess');
            const princessFace = document.getElementById('princess-face');
            if (selectedOption.dataset.answer === correctAnswer) {
                score += 5; // 每题5分
                correctAnswers++; // 增加正确答案计数
                document.getElementById('score').textContent = score;
                feedback.textContent = '🎉 回答正确！';
                feedback.className = 'feedback correct';
                // 添加得分动画
                animateScore();
                // 冰雪公主开心表情
                princessFace.textContent = '😄';
                icePrincess.className = 'ice-princess happy';
                setTimeout(() => {
                    icePrincess.className = 'ice-princess';
                }, 1000);
            } else {
                errorCount++; // 增加错误次数
                document.getElementById('error-count').textContent = errorCount;
                feedback.textContent = `❌ 回答错误！正确答案是: ${correctAnswer}`;
                feedback.className = 'feedback incorrect';
                // 冰雪公主伤心表情
                princessFace.textContent = '😢';
                icePrincess.className = 'ice-princess sad';
                setTimeout(() => {
                    icePrincess.className = 'ice-princess';
                }, 1000);
            }
            
            feedback.style.display = 'block';
            
            // 显示翻译和语音播放
            document.getElementById('translation-content').innerHTML = `
                <strong>中文翻译：</strong>${question.chinese}
            `;
            document.getElementById('translation').style.display = 'block';
            
            // 播放语音
            playAudio(question.english);
            
            // 添加翻转动画
            icePrincess.classList.add('flip');
            
            // 动画结束后移除翻转类
            setTimeout(() => {
                icePrincess.classList.remove('flip');
            }, 1000);
            
            document.getElementById('next-btn').style.display = 'inline-block';
            answered = true;
        }

        // 得分动画
        function animateScore() {
            const scoreElement = document.getElementById('score');
            scoreElement.classList.add('score-animation');
            setTimeout(() => {
                scoreElement.classList.remove('score-animation');
            }, 1000);
        }

        // 选项选择动画
        function animateOption(option, isCorrect) {
            option.classList.add('option-animation');
            if (isCorrect) {
                option.classList.add('correct-animation');
            } else {
                option.classList.add('incorrect-animation');
            }
            setTimeout(() => {
                option.classList.remove('option-animation', 'correct-animation', 'incorrect-animation');
            }, 1000);
        }

        // 播放语音
        function playAudio(text) {
            try {
                // 使用后端TTS API
                const audioUrl = `${API_BASE_URL}/tts?text=${encodeURIComponent(text)}&game=game_translate`;
                // 创建音频对象并播放
                const audio = new Audio(audioUrl);
                audio.onerror = function() {
                    console.log('音频播放失败:', audioUrl);
                    // 尝试使用Web Speech API作为备用
                    const speech = new SpeechSynthesisUtterance(text);
                    speech.lang = 'en-US';
                    window.speechSynthesis.speak(speech);
                };
                audio.play().catch(error => {
                    console.error('播放音频失败:', error);
                    // 尝试使用Web Speech API作为备用
                    const speech = new SpeechSynthesisUtterance(text);
                    speech.lang = 'en-US';
                    window.speechSynthesis.speak(speech);
                });
            } catch (error) {
                console.error('播放音频时出错:', error);
                // 尝试使用Web Speech API作为备用
                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = 'en-US';
                window.speechSynthesis.speak(speech);
                alert('播放音频时出错: ' + error.message);
            }
        }



        // 下一题
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                document.getElementById('current-question').textContent = currentQuestion + 1;
                // 如果是最后一题，设置进度条为100%
                if (currentQuestion === questions.length - 1) {
                    document.getElementById('progress-fill').style.width = '100%';
                } else {
                    document.getElementById('progress-fill').style.width = ((currentQuestion / questions.length) * 100) + '%';
                }
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 显示结果
        function showResult() {
            // 设置进度条为100%
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('question').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-score').textContent = score;
            
            // 计算统计信息
            const totalQuestions = questions.length;
            const accuracy = Math.round((correctAnswers / totalQuestions) * 100);
            const errorRate = 100 - accuracy;
            const endTime = Date.now();
            const durationMs = endTime - startTime;
            const minutes = Math.floor(durationMs / 60000);
            const seconds = Math.floor((durationMs % 60000) / 1000);
            const durationStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 显示统计信息
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            document.getElementById('error-rate').textContent = `${errorRate}%`;
            document.getElementById('duration').textContent = durationStr;
            
            const message = document.getElementById('result-message');
            if (score === 100) {
                message.textContent = '太棒了！你是疑问句翻译大师！';
            } else if (score >= 80) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= 60) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
        }



        // 生成雪花
        function generateSnowflakes() {
            const snowflakesContainer = document.getElementById('snowflakes');
            if (!snowflakesContainer) return;
            
            // 清空现有雪花
            snowflakesContainer.innerHTML = '';
            
            // 创建10个雪花
            for (let i = 0; i < 10; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                
                // 随机大小
                const size = Math.random() * 5 + 2;
                snowflake.style.width = `${size}px`;
                snowflake.style.height = `${size}px`;
                
                // 随机位置
                snowflake.style.left = `${Math.random() * 100}%`;
                
                // 随机延迟
                snowflake.style.animationDelay = `${Math.random() * 3}s`;
                
                // 随机持续时间
                snowflake.style.animationDuration = `${Math.random() * 2 + 2}s`;
                
                snowflakesContainer.appendChild(snowflake);
            }
        }

        // 确保所有资源加载完成后再初始化游戏
        window.onload = function() {
            // 加载游戏数据并初始化
            loadGameData();
            generateSnowflakes();
            
            // 添加事件监听器
            document.getElementById('play-audio-btn').addEventListener('click', function() {
                if (questions && questions[currentQuestion]) {
                    const question = questions[currentQuestion];
                    playAudio(question.english);
                }
            });

            document.getElementById('next-btn').addEventListener('click', nextQuestion);
            document.getElementById('restart-btn').addEventListener('click', initGame);
            document.getElementById('game-restart-btn').addEventListener('click', initGame);
            
            // 每3秒重新生成雪花
            setInterval(generateSnowflakes, 3000);
        };
    </script>
</body>
</html>
