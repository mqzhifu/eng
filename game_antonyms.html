        // 初始化游戏
        function initGame() {
            // 随机选择15对反义词（30张卡片），确保不重复
            const shuffledAntonyms = [...antonyms].sort(() => Math.random() - 0.5);
            const selectedAntonyms = [];
            const usedWords = new Set();
            
            // 筛选不重复的反义词对
            for (const pair of shuffledAntonyms) {
                if (!usedWords.has(pair.word) && !usedWords.has(pair.opposite)) {
                    selectedAntonyms.push(pair);
                    usedWords.add(pair.word);
                    usedWords.add(pair.opposite);
                    if (selectedAntonyms.length === 15) break;
                }
            }
            
            // 创建卡片数组
            cards = [];
            selectedAntonyms.forEach(pair => {
                cards.push(
                    { ...pair, id: Math.random().toString(36).substr(2, 9) },
                    { word: pair.opposite, meaning: getMeaning(pair.opposite), opposite: pair.word, id: Math.random().toString(36).substr(2, 9) }
                );
            });
            
            // 打乱卡片顺序
            cards.sort(() => Math.random() - 0.5);
            
            // 重置游戏状态
            flippedCards = [];
            matchedPairs = 0;
            score = 0;
            errorCount = 0;
            gameStarted = false;
            
            // 更新UI
            document.getElementById('score').textContent = score;
            document.getElementById('error-count').textContent = errorCount;
            document.getElementById('game-time').textContent = '00:00';

            document.getElementById('result').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('give-up-btn').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'none';
            
            // 清除计时器
            clearInterval(timerInterval);
            
            // 生成游戏板
            generateGameBoard();
        }

        // 根据单词获取中文意思
        function getMeaning(word) {
            const pair = antonyms.find(item => item.word === word);
            return pair ? pair.meaning : '';
        }

            "take": "voice/game_antonyms/word_90.mp3",
            "take off": "voice/game_antonyms/word_91.mp3",
            "tall": "voice/game_antonyms/word_92.mp3",
            "teach": "voice/game_antonyms/word_93.mp3",
            "that": "voice/game_antonyms/word_94.mp3",
            "these": "voice/game_antonyms/word_95.mp3",
            "thick": "voice/game_antonyms/word_96.mp3",
            "thin": "voice/game_antonyms/word_97.mp3",
            "this": "voice/game_antonyms/word_98.mp3",
            "those": "voice/game_antonyms/word_99.mp3",
            "turn off": "voice/game_antonyms/word_100.mp3",
            "turn on": "voice/game_antonyms/word_101.mp3",
            "ugly": "voice/game_antonyms/word_102.mp3",
            "unkind": "voice/game_antonyms/word_103.mp3",
            "up": "voice/game_antonyms/word_104.mp3",
            "upstairs": "voice/game_antonyms/word_105.mp3",
            "wake": "voice/game_antonyms/word_106.mp3",
            "warm": "voice/game_antonyms/word_107.mp3",
            "weak": "voice/game_antonyms/word_108.mp3",
            "wet": "voice/game_antonyms/word_109.mp3",
            "white": "voice/game_antonyms/word_110.mp3",
            "win": "voice/game_antonyms/word_111.mp3",
            "woman": "voice/game_antonyms/word_112.mp3",
            "wrong": "voice/game_antonyms/word_113.mp3",
            "yes": "voice/game_antonyms/word_114.mp3",
            "young": "voice/game_antonyms/word_115.mp3"
        };

        // 播放单词语音
        function playWordAudio(word) {
            try {
                // 查找对应的音频文件
                const audioPath = audioMapping[word];
                if (audioPath) {
                    // 创建音频对象并播放
                    const audio = new Audio(audioPath);
                    audio.play().catch(error => {
                        console.error('播放音频失败:', error);
                    });
                } else {
                    console.error('未找到对应的音频文件:', word);
                }
            } catch (error) {
                console.error('播放音频时出错:', error);
            }
        }

        // 选择卡片
        function selectCard(card) {
            if (!gameStarted) {
                // 显示提示弹窗
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>提示</h3>
                        <p>请先点击「开始游戏」按钮</p>
                        <button class="start-btn" id="modal-start-btn">开始游戏</button>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 添加事件监听
                document.getElementById('modal-start-btn').addEventListener('click', () => {
                    modal.remove();
                    startGame();
                });
                return;
            }
            
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            // 播放单词语音
            const word = card.dataset.word;
            playWordAudio(word);
            
            card.classList.add('selected');
            card.style.transform = 'scale(1.1)';
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 1000);
            }
        }

        // 检查匹配
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const word1 = card1.dataset.word;
            const word2 = card2.dataset.word;
            const opposite1 = card1.dataset.opposite;
            
            if (word2 === opposite1) {
                // 匹配成功
                card1.classList.remove('selected');
                card2.classList.remove('selected');
                
                // 添加成功效果：背景色变成绿色
                card1.style.backgroundColor = '#4ecdc4';
                card2.style.backgroundColor = '#4ecdc4';
                
                matchedPairs++;
                score += 10;
                document.getElementById('score').textContent = score;
                
                // 隐藏错误消息
                document.getElementById('error-message').style.display = 'none';
                
                // 1秒后让卡片消失
                setTimeout(() => {
                    card1.style.opacity = '0';
                    card2.style.opacity = '0';
                    card1.style.transform = 'scale(0.5)';
                    card2.style.transform = 'scale(0.5)';
                    card1.style.transition = 'all 0.5s ease';
                    card2.style.transition = 'all 0.5s ease';
                    
                    // 再等0.5秒后添加matched类
                    setTimeout(() => {
                        card1.classList.add('matched');
                        card2.classList.add('matched');
                        
                        // 检查游戏是否结束
                        if (matchedPairs === cards.length / 2) {
                            endGame();
                        }
                    }, 500);
                }, 1000);
            } else {
                // 匹配失败
                card1.style.transform = 'scale(1)';
                card2.style.transform = 'scale(1)';
                
                // 添加错误效果：背景色变成红色
                card1.style.backgroundColor = '#ff6b6b';
                card2.style.backgroundColor = '#ff6b6b';
                
                // 错误次数增加
                errorCount++;
                document.getElementById('error-count').textContent = errorCount;
                
                // 检查错误次数是否达到10次
                if (errorCount >= 10) {
                    endGame();
                    return;
                }
                
                // 显示错误消息
                const errorMessage = document.getElementById('error-message');
                errorMessage.textContent = `❌ 错误！"${word1}" 和 "${word2}" 不是反义词 (错误次数: ${errorCount}/10)`;
                errorMessage.style.display = 'block';
                
                // 2秒后隐藏错误消息和移除selected类，恢复背景色
                setTimeout(() => {
                    card1.classList.remove('selected');
                    card2.classList.remove('selected');
                    card1.style.backgroundColor = '';
                    card2.style.backgroundColor = '';
                    errorMessage.style.display = 'none';
                }, 2000);
            }
            
            flippedCards = [];
        }



        // 开始游戏
        function startGame() {
            gameStarted = true;
            gameStartTime = Date.now();
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('give-up-btn').style.display = 'inline-block';
            document.getElementById('restart-btn').style.display = 'inline-block';
            
            // 启动计时器
            startTimer();
        }
        
        // 启动计时器
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsedTime = Math.round((Date.now() - gameStartTime) / 1000);
                const minutes = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
                const seconds = (elapsedTime % 60).toString().padStart(2, '0');
                document.getElementById('game-time').textContent = `${minutes}:${seconds}`;
                
                // 检查是否超过10分钟（600秒）
                if (elapsedTime >= 600) {
                    endGame();
                }
            }, 1000);
        }

        // 结束游戏
        function endGame() {
            gameStarted = false;
            clearInterval(timerInterval);
            gameEndTime = Date.now();
            const gameTime = Math.round((gameEndTime - gameStartTime) / 1000);
            
            // 计算用时
            const minutes = Math.floor(gameTime / 60);
            const seconds = gameTime % 60;
            const timeString = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
            
            // 创建弹窗
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🎉 游戏结束！</h2>
                    <div class="modal-score">${score}</div>
                    <div class="modal-time">总耗时：${timeString}</div>
                    <div class="modal-error-count">错误次数：${errorCount}/10</div>
                    <div class="modal-message"></div>
                    <div class="modal-buttons">
                        <button class="restart-btn" id="modal-restart-btn">再玩一次</button>
                        <button class="home-btn" id="modal-home-btn">返回</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 设置消息
            const message = modal.querySelector('.modal-message');
            if (score === cards.length / 2 * 10) {
                message.textContent = '太棒了！你找到了所有反义词！';
            } else if (score >= cards.length / 2 * 10 * 0.7) {
                message.textContent = '做得很好！继续加油！';
            } else if (score >= cards.length / 2 * 10 * 0.5) {
                message.textContent = '不错！再多练习一下吧！';
            } else {
                message.textContent = '没关系，再试一次吧！';
            }
            
            // 添加事件监听
            document.getElementById('modal-restart-btn').addEventListener('click', () => {
                modal.remove();
                initGame();
            });
            
            document.getElementById('modal-home-btn').addEventListener('click', () => {
                window.location.href = 'game_index.html';
            });
        }

        // 放弃游戏
        function giveUp() {
            // 显示中文翻译
            generateGameBoard(true);
            
            // 使所有卡片不可点击
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                card.style.pointerEvents = 'none';
                card.style.opacity = '0.7';
            });
            
            // 重置错误次数
            errorCount = 0;
            document.getElementById('error-count').textContent = errorCount;
        }

        // 重新开始游戏
        function restartGame() {
            initGame();
        }

        // 事件监听
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('give-up-btn').addEventListener('click', giveUp);
        document.getElementById('restart-btn').addEventListener('click', restartGame);
        document.getElementById('result-restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
